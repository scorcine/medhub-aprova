<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudar — MedHub R1</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("medhub-aprova-theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/aprova.css">
</head>
<body class="app-body">
  <div class="page-bg page-bg--app" aria-hidden="true"></div>

  <header class="wrap app-bar">
    <div class="app-bar-top">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="/assets/medhub-logo.png" alt="MedHub" width="56" height="56">
        <span class="brand-text">MedHub <span>R1</span></span>
      </a>
      <div class="header-tools">
        <form class="auth-form" id="auth-form" autocomplete="on">
          <label class="sr-only" for="auth-login">Login</label>
          <input class="auth-input" type="text" name="login" id="auth-login" placeholder="Login" autocomplete="username" required>
          <label class="sr-only" for="auth-password">Senha</label>
          <input class="auth-input" type="password" name="password" id="auth-password" placeholder="Senha" autocomplete="current-password" required>
          <button type="submit" class="btn btn-primary btn-compact">Entrar</button>
          <button type="button" class="btn btn-ghost btn-compact" id="auth-register">Cadastre-se</button>
        </form>
        <div class="auth-session" id="auth-session" hidden>
          <span class="auth-user" id="auth-user-label"></span>
          <button type="button" class="btn btn-ghost btn-compact" id="auth-logout">Sair</button>
        </div>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Alternar tema" aria-pressed="false" title="Tema">
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>
          </svg>
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"/>
          </svg>
        </button>
      </div>
    </div>
    <nav class="app-nav" aria-label="Modos de estudo">
      <button type="button" class="tab" data-panel="hoje" aria-selected="true">Hoje</button>
      <button type="button" class="tab" data-panel="flashcards" aria-selected="false">Flashcards</button>
      <button type="button" class="tab" data-panel="questoes" aria-selected="false">Questões</button>
    </nav>
  </header>
  <p class="wrap auth-msg" id="auth-msg" hidden></p>

  <main class="wrap app-main">
    <section id="panel-hoje" class="panel active" aria-labelledby="hoje-title">
      <h2 id="hoje-title">Revisão de hoje</h2>
      <p class="muted">Só entram cards novos ou com revisão vencida.</p>
      <div class="study-card" id="today-summary">
        <div class="label">Agenda</div>
        <p class="prompt" id="today-prompt">Carregando…</p>
        <div class="actions-row">
          <button type="button" class="btn btn-primary" id="today-start" data-goto="flashcards">Começar revisão</button>
          <button type="button" class="btn btn-ghost" data-goto="questoes">Abrir questões</button>
        </div>
        <div class="stats" id="today-stats"></div>
      </div>
    </section>

    <section id="panel-flashcards" class="panel" aria-labelledby="fc-title" hidden>
      <h2 id="fc-title">Flashcards</h2>
      <p class="muted" id="fc-hint">Fila de hoje · revelar · acertei / errei.</p>
      <div class="study-card" id="fc-card">
        <div class="label" id="fc-deck-label">Deck</div>
        <p class="prompt" id="fc-front">—</p>
        <p class="answer" id="fc-back" hidden>—</p>
        <div class="actions-row">
          <button type="button" class="btn btn-ghost" id="fc-reveal">Mostrar resposta</button>
          <button type="button" class="btn btn-primary" id="fc-easy" hidden>Acertei</button>
          <button type="button" class="btn btn-ghost" id="fc-hard" hidden>Errei</button>
          <button type="button" class="btn btn-ghost" id="fc-back-hoje" hidden data-goto="hoje">Voltar a Hoje</button>
        </div>
      </div>
    </section>

    <section id="panel-questoes" class="panel" aria-labelledby="q-title" hidden>
      <h2 id="q-title">Banco de questões</h2>
      <p class="muted">Escolha a alternativa · feedback na hora.</p>
      <div class="study-card" id="q-card">
        <div class="label" id="q-theme">Tema</div>
        <p class="prompt" id="q-stem">—</p>
        <div id="q-choices"></div>
        <p class="answer" id="q-explain" hidden></p>
        <div class="actions-row">
          <button type="button" class="btn btn-primary" id="q-next" hidden>Próxima</button>
        </div>
        <div class="stats" id="q-stats"></div>
      </div>
    </section>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/flashcards.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
